<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocAssistant — Floating Mascot</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90%;
    margin: 0 auto;
  }

  .mascot-wrap {
    display: inline-block;
    animation: float 4.8s ease-in-out infinite;
    transform-origin: center bottom;
    will-change: transform;
  }

  .mascot-wrap img {
    display: block;
    width: 280px;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  .mascot-shadow {
    width: 200px;
    height: 16px;
    margin: -14px auto 0;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(31,47,82,0.16) 0%, transparent 72%);
    animation: shadow-breathe 4.8s ease-in-out infinite;
    will-change: transform, opacity;
  }

  @keyframes float {
    0%   { transform: translateY(0px)    rotate(0deg); }
    18%  { transform: translateY(-4px)   rotate(0.5deg); }
    50%  { transform: translateY(-11px)  rotate(1.3deg); }
    78%  { transform: translateY(-5px)   rotate(0.4deg); }
    100% { transform: translateY(0px)    rotate(0deg); }
  }

  @keyframes shadow-breathe {
    0%   { transform: scaleX(1)     scaleY(1);    opacity: 1; }
    50%  { transform: scaleX(0.74)  scaleY(0.6);  opacity: 0.4; }
    100% { transform: scaleX(1)     scaleY(1);    opacity: 1; }
  }
</style>
</head>
